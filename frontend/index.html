<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 资讯日报</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+QingKe+HuangYou&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow"></div>

  <header class="hero">
    <div class="hero-inner">
      <div class="badge-live">
        <span class="dot"></span>
        <span>实时 · AI 资讯</span>
      </div>
      <h1 class="title">AI 资讯日报</h1>
      <p class="subtitle">每日精选 · 智能摘要 · 重要度排序</p>
      <div class="stats" id="meta">
        <span class="stat-item"><span class="stat-label">状态</span><span class="stat-value">加载中…</span></span>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="搜索新闻关键词…" autocomplete="off">
        <button class="search-clear" id="search-clear" aria-label="清除">×</button>
      </div>
      <div class="tabs">
        <button class="tab tab-active" data-tab="all">全部</button>
        <button class="tab" data-tab="fav">
          <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6.5 5c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3 4 0 5.5 4 4 7-2.5 4.5-9.5 9-9.5 9z"/></svg>
          收藏 <span class="fav-count" id="fav-count">0</span>
        </button>
      </div>
      <button class="refresh-btn" id="refresh-btn" title="重新抓取最新资讯">
        <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 10 15 10"/></svg>
        <span class="refresh-text">刷新数据</span>
      </button>
    </div>
  </div>

  <main>
    <div class="news-grid" id="news-list"></div>
    <div class="empty" id="empty-state" hidden>
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
      </div>
      <p class="empty-text">没有匹配的新闻</p>
      <p class="empty-sub" id="empty-sub">试试其他关键词</p>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <footer>
    <p>数据来源 · <span class="src-tag tc">TechCrunch</span> <span class="src-tag tv">The Verge</span> <span class="src-tag tw">X / Twitter</span></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
